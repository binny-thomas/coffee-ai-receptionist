<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Coffee AI Receptionist</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <header>
        <h1>CAFECAP</h1>
        <p>Freshly Roasted • 100% Pure Coffee • No Chicory</p>
    </header>

    <main>
        <div class="container">    
            <section id="welcome-section">
                <h2>Welcome</h2>

                <p>
                    Hello!
                    I'm your AI Coffee Assistant.
                    Ask me anything about our coffee products.
                </p>
            </section>

            <section id="chat-section">

                <h2>Chat</h2>
            
                <div id="chat-messages" class="chat-window">
            
                </div>
            
            </section>

            <section id="input-section">

                <input
                    id="message-input"
                    type="text"
                    placeholder="Type your message here">

                <button id="send-button">
                    Send
                </button>

            </section>
        </div>
    </main>

    <footer>

        <p>
            © 2026 CAFECAP Coffee
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
